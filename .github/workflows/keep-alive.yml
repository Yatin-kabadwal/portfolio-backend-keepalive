name: Keep Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5          # ← prevents infinite hang

    steps:
      - name: Ping Backend
        run: |
          echo "🤖 Pinging backend..."

          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            https://portfolio-backend-iiim.onrender.com)

          echo "HTTP Status: $response"

          if [ "$response" -eq 200 ]; then
            echo "✅ Backend is alive!"
          else
            echo "⚠️ Backend responded with status: $response"
            exit 1
          fi
